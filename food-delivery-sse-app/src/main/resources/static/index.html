<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Food Delivery App</title>
	<style>
	    #eventLogBlock {
			position: absolute;
			top: 0px;
			left: 500px;
			width: 250px;
	        height: 150px;
	        overflow: scroll;
	        padding: 0.5rem;
	        border: 1px solid black;
			white-space: pre;
	    }
		TextArea {
			width: 250px;
		    height: 150px;
			white-space: pre;
		}
	</style>
</head>
<body>
    <h1>Food Delivery App</h1>
    <div>
        <div id="order-status"></div>
    </div>
	
	<pre id="eventLogBlock"></pre>
	
	<button onclick="createOrder()">Create order</button>
	<p>
	<button onclick="createLogMessage()">Create log message</button>
    <p>
	<TextArea id="adHocLogBlock"></TextArea>
</body>
<script>
    const eventLogBlockElement = document.querySelector("#eventLogBlock");
    const adHocBlockElement = document.querySelector("#adHocLogBlock");
    var eventSource = new EventSource("/order-status"); // EventSource API: See https://developer.mozilla.org/en-US/docs/Web/API/EventSource

    eventSource.addEventListener("order", (event) => renderEvent(event));
    eventSource.addEventListener("kitchen", (event) => renderEvent(event));
    eventSource.addEventListener("on-the-way", (event) => renderEvent(event));
    eventSource.addEventListener("delivered", (event) => renderEvent(event));
	eventSource.addEventListener("logEvent", (event) => addAdHocLogLine(event.data));
	
	function createOrder() {
		/* stops page reload --> Not required since we do not add a Post form: If you send a Post form the browser 
		   needs to receive a new HTML page (which is now not necessary because only a 'bare' button without enclosing form is used).
		*/
	    //   event.preventDefault(); 

	    fetch('/order-food', {
	        method: 'POST'
	    }).then(response => {
	        addEventLogLine("Order request sent");
	    }).catch(err => {
	        addEventLogLine("Error sending order: " + err);
	    });
	}

	function createLogMessage() {
		/* stops page reload --> Not required since we do not add a Post form: If you send a Post form the browser 
		   needs to receive a new HTML page (which is now not necessary because only a 'bare' button without enclosing form is used).
		*/
	    //   event.preventDefault(); 

	    fetch('/logMessage', {
	        method: 'POST'
	    }).then(response => {
	        addEventLogLine("Logmessage request sent");
	    }).catch(err => {
	        addEventLogLine("Error sending Logmessage request: " + err);
	    });
	}

    function renderEvent(event) {

        const data = document.getElementById("order-status");
        const p = document.createElement("p");
        const message = getOrderStatus(event);
        const text = document.createTextNode(message);
        p.appendChild(text)
        data.appendChild(p);
    }
	
	function addEventLogLine(text) {
	    // Adds the provided text to
	    eventLogBlockElement.textContent += text + "\n";
	}

	function addAdHocLogLine(text) {
	    // Adds the provided text to
	    adHocBlockElement.textContent += text + "\n";
	}

    function getOrderStatus(event) {

        var order = JSON.parse(event.data);
		
        addEventLogLine("Event data ontvangen");
		
        switch(order.status) {
            case 'ORDER_PLACED':
                return "Order " + order.id + " placed.";
            case 'IN_THE_KITCHEN':
                return "Order " + order.id + " is in the kitchen.";
            case 'ON_THE_WAY':
                return "Order " + order.id + " is on the way.";
            case 'DELIVERED':
                return "Order " + order.id + " delivered.";
            default:
                return "Unknown order status";
        }
    }

</script>
</html>
